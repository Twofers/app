<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin | Twofer</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icon-16.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="theme-color" content="#f6f7f4" />
    <link rel="stylesheet" href="/styles.css?v=20260706-admin-refresh" />
  </head>
  <!--
    Minimal signed-out shell (audit F-015): no internal section names, queue
    names, or admin endpoint config are shipped to signed-out visitors. When a
    stored admin token exists, admin.js fetches /admin/app.html and injects the
    dashboard; all privileged data still requires a server-verified admin
    session either way.
  -->
  <body class="admin-shell">
    <div data-admin-app-root>
      <header class="site-header">
        <nav class="nav" aria-label="Admin navigation">
          <a class="brand" href="/admin" aria-label="Twofer admin home">
            <span class="brand-mark" aria-hidden="true"><img src="/assets/twofer-mark.png" alt="" /></span>
            <span>Twofer Admin</span>
          </a>
          <div class="nav-actions">
            <span data-admin-status class="admin-badge warning">Admin session not connected</span>
            <a class="button button-small" href="/admin/login" data-admin-login-link>Login</a>
            <button class="button button-small button-secondary" type="button" data-admin-sign-out hidden>Sign out</button>
          </div>
        </nav>
      </header>

      <main class="admin-main">
        <section class="admin-section" aria-label="Restricted access">
          <h1>Restricted access</h1>
          <p class="lede">Admin access is limited to active users in the server-side admin allowlist. Sign in to continue.</p>
          <a class="button" href="/admin/login">Sign in</a>
        </section>
      </main>
    </div>
    <script src="/admin/admin.js?v=20260811-admin-shell"></script>
  </body>
</html>
