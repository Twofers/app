<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twofer</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
        padding: 2rem 1.25rem;
        max-width: 40rem;
        margin: 0 auto;
      }
      footer {
        border-top: 1px solid #e5e5e5;
        padding: 1.25rem;
        text-align: center;
        font-size: 0.9rem;
        color: #444;
      }
      footer a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
      footer a:hover {
        text-decoration: underline;
      }
      footer .sep {
        margin: 0 0.5rem;
        color: #bbb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Twofer</h1>
      <p>Local deals — browse, claim, and redeem.</p>
    </main>
    <footer>
      <a href="https://www.twoferapp.com/privacy">Privacy Policy</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="https://www.twoferapp.com/terms">Terms of Service</a>
    </footer>
  </body>
</html>
