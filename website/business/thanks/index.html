<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business request received | Twofer</title>
    <style>
      body {
        margin: 0;
        color: #0f172a;
        background: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 80px 0;
      }
      a {
        color: #2563eb;
        font-weight: 800;
        text-decoration: none;
      }
      h1 {
        margin: 0;
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.95;
        letter-spacing: 0;
      }
      p {
        color: #475569;
        font-size: 20px;
        line-height: 1.65;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }
      .button {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        border: 1px solid #2563eb;
        border-radius: 999px;
        padding: 11px 18px;
        background: #2563eb;
        color: #fff;
      }
      .button.secondary {
        background: #fff;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks.</h1>
      <p>
        Your Twofer business access request was received. Business tools are reviewed before activation during
        the DFW preview. Use the same email in the Twofer app so your submitted details can appear there for review.
      </p>
      <div class="actions">
        <a class="button" href="/">Back to Twofer</a>
        <a class="button secondary" href="/support">Contact support</a>
      </div>
    </main>
  </body>
</html>
