<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request business access | Twofer</title>
    <meta name="description" content="Request reviewed Twofer business access for the Dallas launch area." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-application-endpoint="https://kvodhiqhdqnptqovovia.supabase.co/functions/v1/submit-business-application">
    <header class="site-header">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="/">Twofer</a>
        <div class="nav-links">
          <a href="/support/">Support</a>
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
          <a href="/business-terms/">Business Terms</a>
        </div>
      </nav>
    </header>
    <main>
      <h1>Request business access</h1>
      <p class="lede">
        Twofer business accounts are reviewed before activation. We are starting with select Dallas-area
        cafes, coffee shops, bakeries, and similar local businesses.
      </p>

      <form id="business-application" class="section" novalidate>
        <div class="form-grid">
          <label>
            Business name
            <input name="business_name" autocomplete="organization" required maxlength="120" />
          </label>
          <label>
            Owner or manager name
            <input name="contact_name" autocomplete="name" required maxlength="120" />
          </label>
          <label>
            Business email
            <input name="email" type="email" autocomplete="email" required maxlength="254" />
          </label>
          <label>
            Phone number
            <input name="phone" autocomplete="tel" maxlength="40" />
          </label>
          <label class="full">
            Business address
            <input name="address" autocomplete="street-address" maxlength="240" />
          </label>
          <label>
            Business type
            <select name="business_type">
              <option value="">Select one</option>
              <option>Coffee shop</option>
              <option>Cafe</option>
              <option>Bakery</option>
              <option>Restaurant</option>
              <option>Other local business</option>
            </select>
          </label>
          <label>
            Website or Instagram
            <input name="website_or_instagram" maxlength="180" />
          </label>
          <label class="full">
            Best slow hours
            <textarea name="slow_hours" maxlength="500"></textarea>
          </label>
          <label class="full">
            What would you like to promote?
            <textarea name="offer_interests" maxlength="500"></textarea>
          </label>
          <label class="full">
            Launch area confirmation
            <input name="launch_area" maxlength="120" placeholder="Example: Dallas, Oak Cliff, Bishop Arts" />
          </label>
          <label class="visually-hidden" aria-hidden="true">
            Company website
            <input name="company_website" tabindex="-1" autocomplete="off" />
          </label>
          <label class="check full">
            <input name="terms_accepted" type="checkbox" required />
            <span>I accept the <a href="/business-terms/" target="_blank" rel="noreferrer">Business Terms</a>.</span>
          </label>
          <label class="check full">
            <input name="privacy_acknowledged" type="checkbox" required />
            <span>I acknowledge the <a href="/privacy/" target="_blank" rel="noreferrer">Privacy Policy</a>.</span>
          </label>
        </div>
        <div class="cta-row">
          <button class="button" type="submit">Submit request</button>
          <a class="button secondary" href="/support/">Contact support</a>
        </div>
        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script>
      const form = document.querySelector("#business-application");
      const statusEl = document.querySelector("#form-status");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusEl.className = "status";
        statusEl.textContent = "Submitting...";
        const data = new FormData(form);
        const payload = Object.fromEntries(data.entries());
        payload.terms_accepted = data.get("terms_accepted") === "on";
        payload.privacy_acknowledged = data.get("privacy_acknowledged") === "on";
        try {
          const response = await fetch(document.body.dataset.applicationEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error("Request failed");
          window.location.assign("/business/thanks/");
        } catch {
          statusEl.className = "status error";
          statusEl.textContent = "We could not submit the request. Please contact support@twoferapp.com.";
        }
      });
    </script>
  </body>
</html>
