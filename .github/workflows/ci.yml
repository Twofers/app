name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    # Release-gate area 1: no secret may enter the repo or its history.
    # Runs on every push/PR; needs no repo secrets.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so a secret in any past commit is caught

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree + git history for secrets
        run: gitleaks detect --source . --redact --no-banner --config .gitleaks.toml --exit-code 1

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Localization gate: en/es/ko key parity + every t() key resolvable in
      # en.json. Kept out of the pretest hook (a locked test pins that string);
      # enforced here so untranslated copy can't merge.
      - name: i18n key parity
        run: npm run check:i18n-keys

      - name: Test
        run: npm run test

      # Audit F-012: fail when docs/release-audit/generated-state.* no longer
      # match the code (versions, migration count, function list, flags).
      - name: Release-state drift check
        run: npm run gate:release-state
